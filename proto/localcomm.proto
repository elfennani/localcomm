syntax = "proto3";
package localcomm;

service LocalComm {
  rpc GetDeviceList (GetDeviceListRequest) returns (GetDeviceListResponse);
  rpc TypeText (TextTypeRequest) returns (Empty);
}

message TextTypeRequest{
  string text = 1;
  bool submit = 2;
}

message Device{
  string name = 1;
  string address = 2;
}

message GetDeviceListRequest{}
message GetDeviceListResponse{
  repeated Device list = 1;
}

message Empty{}